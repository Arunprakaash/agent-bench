<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-s3" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-s3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-s3)" rx="16"/>

  <g transform="translate(40, 24)">
    <!-- Main code editor card -->
    <rect x="0" y="0" width="320" height="232" fill="#ffffff" filter="url(#shadow-s3)" rx="8"/>

    <!-- Window chrome header -->
    <path d="M 0 8 C 0 3.58 3.58 0 8 0 L 312 0 C 316.42 0 320 3.58 320 8 L 320 32 L 0 32 L 0 8 Z" fill="#f9fafb"/>
    <circle cx="16" cy="16" r="4" fill="#e5e7eb"/>
    <circle cx="30" cy="16" r="4" fill="#e5e7eb"/>
    <circle cx="44" cy="16" r="4" fill="#e5e7eb"/>
    <rect x="0" y="32" width="320" height="1" fill="#f3f4f6"/>

    <!-- POST badge + URL bar -->
    <rect x="16" y="48" width="36" height="20" fill="#f3f4f6" rx="4"/>
    <text x="22" y="61" font-family="monospace, sans-serif" font-size="10" font-weight="bold" fill="#4b5563">POST</text>
    <rect x="62" y="54" width="210" height="8" fill="#e5e7eb" rx="4"/>

    <!-- YAML key: level 0 -->
    <rect x="16" y="88" width="12" height="6" fill="#d1d5db" rx="3"/>

    <!-- Level 1: key + value -->
    <rect x="32" y="106" width="64" height="6" fill="#355FA7" opacity="0.6" rx="3"/>
    <rect x="104" y="106" width="44" height="6" fill="#9ca3af" rx="3"/>

    <!-- Level 1: key with nested block -->
    <rect x="32" y="124" width="72" height="6" fill="#355FA7" opacity="0.6" rx="3"/>

    <!-- Level 2: nested key + value -->
    <rect x="48" y="142" width="52" height="6" fill="#355FA7" opacity="0.4" rx="3"/>
    <rect x="108" y="142" width="120" height="6" fill="#9ca3af" rx="3"/>

    <!-- Level 2: nested key + value -->
    <rect x="48" y="160" width="48" height="6" fill="#355FA7" opacity="0.4" rx="3"/>
    <rect x="104" y="160" width="80" height="6" fill="#9ca3af" rx="3"/>

    <!-- Level 1: another key with nested -->
    <rect x="32" y="178" width="80" height="6" fill="#355FA7" opacity="0.6" rx="3"/>

    <!-- Level 2: nested value bar -->
    <rect x="48" y="196" width="160" height="6" fill="#9ca3af" rx="3"/>

    <!-- Pass badge at bottom -->
    <rect x="16" y="214" width="56" height="20" fill="#d1fae5" rx="6"/>
    <rect x="24" y="222" width="40" height="4" fill="#059669" rx="2" opacity="0.7"/>

    <!-- Closing brace marker -->
    <rect x="16" y="214" width="12" height="6" fill="#d1d5db" rx="3" opacity="0"/>
  </g>
</svg>
