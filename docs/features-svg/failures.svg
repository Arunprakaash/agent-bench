<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-s4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-s4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-s4)" rx="16"/>

  <g transform="translate(32, 22)">
    <!-- Header: FAILURE INBOX label + search bar -->
    <text x="0" y="12" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">FAILURE INBOX</text>
    <rect x="0" y="18" width="336" height="20" fill="#e5e7eb" rx="6"/>
    <rect x="10" y="24" width="100" height="6" fill="#d1d5db" rx="3"/>

    <!-- Row 1 -->
    <rect x="0" y="50" width="336" height="38" fill="#ffffff" filter="url(#shadow-s4)" rx="8"/>
    <rect x="12" y="61" width="48" height="20" fill="#fee2e2" rx="4"/>
    <text x="23" y="75" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626">FAIL</text>
    <circle cx="80" cy="71" r="6" fill="#e5e7eb"/>
    <rect x="96" y="64" width="130" height="6" fill="#d1d5db" rx="3"/>
    <rect x="96" y="76" width="90" height="6" fill="#e5e7eb" rx="3"/>

    <!-- Row 2 -->
    <rect x="0" y="98" width="336" height="38" fill="#ffffff" filter="url(#shadow-s4)" rx="8"/>
    <rect x="12" y="109" width="48" height="20" fill="#fee2e2" rx="4"/>
    <text x="23" y="123" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626">FAIL</text>
    <circle cx="80" cy="119" r="6" fill="#e5e7eb"/>
    <rect x="96" y="112" width="150" height="6" fill="#d1d5db" rx="3"/>
    <rect x="96" y="124" width="80" height="6" fill="#e5e7eb" rx="3"/>

    <!-- Row 3 -->
    <rect x="0" y="146" width="336" height="38" fill="#ffffff" filter="url(#shadow-s4)" rx="8"/>
    <rect x="12" y="157" width="48" height="20" fill="#fee2e2" rx="4"/>
    <text x="23" y="171" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626">FAIL</text>
    <circle cx="80" cy="167" r="6" fill="#e5e7eb"/>
    <rect x="96" y="160" width="120" height="6" fill="#d1d5db" rx="3"/>
    <rect x="96" y="172" width="100" height="6" fill="#e5e7eb" rx="3"/>

    <!-- Row 4: expanded/selected failure -->
    <rect x="0" y="194" width="336" height="72" fill="#ffffff" filter="url(#shadow-s4)" stroke="#fee2e2" stroke-width="1.5" rx="8"/>
    <rect x="12" y="204" width="48" height="20" fill="#fee2e2" rx="4"/>
    <text x="23" y="218" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626">FAIL</text>
    <circle cx="80" cy="214" r="6" fill="#e5e7eb"/>
    <rect x="96" y="207" width="140" height="6" fill="#d1d5db" rx="3"/>
    <text x="12" y="238" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">EXPECTED</text>
    <text x="100" y="238" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">REASONING</text>
    <rect x="12" y="244" width="210" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="254" width="160" height="6" fill="#e5e7eb" rx="3"/>
  </g>
</svg>
