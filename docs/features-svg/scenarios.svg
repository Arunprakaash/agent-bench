<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-s1" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-s1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-s1)" rx="16"/>

  <g transform="translate(32, 24)">
    <!-- Scenario name pill at top -->
    <rect x="0" y="0" width="80" height="16" fill="#e5e7eb" rx="8"/>
    <rect x="8" y="5" width="48" height="6" fill="#9ca3af" rx="3"/>

    <!-- Turn 1 card -->
    <rect x="0" y="26" width="336" height="54" fill="#ffffff" filter="url(#shadow-s1)" rx="8"/>
    <text x="12" y="41" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">TURN 1</text>
    <rect x="12" y="48" width="200" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="60" width="140" height="6" fill="#d1d5db" rx="3"/>
    <!-- Pass badge -->
    <rect x="268" y="34" width="48" height="24" fill="#d1fae5" rx="6"/>
    <rect x="276" y="44" width="32" height="4" fill="#059669" rx="2" opacity="0.7"/>

    <!-- Turn 2 card -->
    <rect x="0" y="92" width="336" height="54" fill="#ffffff" filter="url(#shadow-s1)" rx="8"/>
    <text x="12" y="107" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">TURN 2</text>
    <rect x="12" y="114" width="180" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="126" width="120" height="6" fill="#d1d5db" rx="3"/>
    <!-- Pass badge -->
    <rect x="268" y="100" width="48" height="24" fill="#d1fae5" rx="6"/>
    <rect x="276" y="110" width="32" height="4" fill="#059669" rx="2" opacity="0.7"/>

    <!-- Turn 3 card (fail) -->
    <rect x="0" y="158" width="336" height="82" fill="#ffffff" filter="url(#shadow-s1)" stroke="#fee2e2" stroke-width="1.5" rx="8"/>
    <text x="12" y="173" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">TURN 3</text>
    <rect x="12" y="180" width="190" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="192" width="130" height="6" fill="#d1d5db" rx="3"/>
    <!-- Fail badge -->
    <rect x="268" y="166" width="48" height="24" fill="#fee2e2" rx="6"/>
    <text x="279" y="182" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626">FAIL</text>
    <!-- Expectation label below -->
    <text x="12" y="215" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">EXPECTATION</text>
    <rect x="12" y="222" width="160" height="6" fill="#e5e7eb" rx="3"/>
  </g>
</svg>
