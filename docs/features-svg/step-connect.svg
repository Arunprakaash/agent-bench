<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-h1" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-h1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-h1)" rx="16"/>

  <g transform="translate(40, 24)">
    <!-- Main card -->
    <rect x="0" y="0" width="320" height="232" fill="#ffffff" filter="url(#shadow-h1)" rx="8"/>

    <!-- Window chrome header -->
    <path d="M 0 8 C 0 3.58 3.58 0 8 0 L 312 0 C 316.42 0 320 3.58 320 8 L 320 32 L 0 32 L 0 8 Z" fill="#f9fafb"/>
    <circle cx="16" cy="16" r="4" fill="#e5e7eb"/>
    <circle cx="30" cy="16" r="4" fill="#e5e7eb"/>
    <circle cx="44" cy="16" r="4" fill="#e5e7eb"/>
    <rect x="0" y="32" width="320" height="1" fill="#f3f4f6"/>

    <!-- POST badge + URL bar -->
    <rect x="16" y="48" width="36" height="20" fill="#f3f4f6" rx="4"/>
    <text x="22" y="61" font-family="monospace, sans-serif" font-size="10" font-weight="bold" fill="#4b5563">POST</text>
    <rect x="62" y="54" width="210" height="8" fill="#e5e7eb" rx="4"/>

    <!-- Divider -->
    <rect x="16" y="80" width="288" height="1" fill="#f3f4f6"/>

    <!-- AGENT section label -->
    <text x="16" y="97" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">AGENT</text>

    <!-- base_url row -->
    <rect x="16" y="108" width="56" height="6" fill="#355FA7" opacity="0.6" rx="3"/>
    <rect x="80" y="108" width="140" height="6" fill="#9ca3af" rx="3"/>

    <!-- auth row -->
    <rect x="16" y="130" width="36" height="6" fill="#355FA7" opacity="0.6" rx="3"/>
    <rect x="60" y="130" width="100" height="6" fill="#9ca3af" rx="3"/>

    <!-- model row -->
    <rect x="16" y="152" width="44" height="6" fill="#355FA7" opacity="0.6" rx="3"/>
    <rect x="68" y="152" width="120" height="6" fill="#9ca3af" rx="3"/>

    <!-- Divider -->
    <rect x="16" y="172" width="288" height="1" fill="#f3f4f6"/>

    <!-- Connected badge -->
    <rect x="16" y="184" width="80" height="24" fill="#d1fae5" rx="6"/>
    <rect x="28" y="194" width="56" height="4" fill="#059669" rx="2" opacity="0.7"/>
  </g>
</svg>
