<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-h3" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-h3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-h3)" rx="16"/>

  <g transform="translate(32, 28)">
    <!-- Step indicator row: 3 pills connected by lines -->
    <!-- Line 1 -->
    <rect x="32" y="9" width="72" height="2" fill="#355FA7" opacity="0.3" rx="1"/>
    <!-- Line 2 -->
    <rect x="192" y="9" width="72" height="2" fill="#e5e7eb" rx="1"/>

    <!-- Pill 1: filled (done) -->
    <rect x="0" y="0" width="32" height="20" fill="#355FA7" opacity="0.6" rx="10"/>
    <rect x="8" y="7" width="16" height="6" fill="#ffffff" rx="3" opacity="0.8"/>

    <!-- Pill 2: filled (done) -->
    <rect x="104" y="0" width="88" height="20" fill="#355FA7" opacity="0.6" rx="10"/>
    <rect x="116" y="7" width="64" height="6" fill="#ffffff" rx="3" opacity="0.8"/>

    <!-- Pill 3: light gray (pending) -->
    <rect x="264" y="0" width="72" height="20" fill="#e5e7eb" rx="10"/>
    <rect x="276" y="7" width="48" height="6" fill="#d1d5db" rx="3"/>

    <!-- Judge evaluation card -->
    <rect x="0" y="34" width="336" height="182" fill="#ffffff" filter="url(#shadow-h3)" rx="8"/>

    <!-- Card header: JUDGE EVALUATION label + PASS badge -->
    <text x="12" y="52" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">JUDGE EVALUATION</text>
    <rect x="272" y="40" width="52" height="22" fill="#d1fae5" rx="6"/>
    <rect x="280" y="49" width="36" height="4" fill="#059669" rx="2" opacity="0.7"/>

    <!-- Divider -->
    <rect x="12" y="60" width="312" height="1" fill="#f3f4f6"/>

    <!-- Agent avatar circle + label bar -->
    <circle cx="28" cy="84" r="12" fill="#e5e7eb"/>
    <rect x="48" y="80" width="80" height="6" fill="#d1d5db" rx="3"/>
    <rect x="48" y="91" width="52" height="6" fill="#e5e7eb" rx="3"/>

    <!-- EXPECTED label + bar -->
    <text x="12" y="120" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">EXPECTED</text>
    <rect x="72" y="113" width="140" height="6" fill="#e5e7eb" rx="3"/>

    <!-- Divider -->
    <rect x="12" y="130" width="312" height="1" fill="#f3f4f6"/>

    <!-- REASONING label + 2 bars -->
    <text x="12" y="148" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">REASONING</text>
    <rect x="12" y="156" width="280" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="168" width="220" height="6" fill="#e5e7eb" rx="3"/>

    <!-- Bottom bar -->
    <rect x="12" y="188" width="160" height="6" fill="#d1d5db" rx="3"/>
    <rect x="12" y="200" width="120" height="6" fill="#e5e7eb" rx="3"/>
  </g>
</svg>
