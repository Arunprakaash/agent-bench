<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-h4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-h4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-h4)" rx="16"/>

  <g transform="translate(32, 24)">
    <!-- Schedule card (top half) -->
    <rect x="0" y="0" width="336" height="104" fill="#ffffff" filter="url(#shadow-h4)" rx="8"/>

    <text x="12" y="18" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">SCHEDULE</text>

    <!-- Divider -->
    <rect x="12" y="24" width="312" height="1" fill="#f3f4f6"/>

    <!-- Cron time indicator pills row -->
    <rect x="12" y="36" width="40" height="16" fill="#355FA7" opacity="0.15" rx="8"/>
    <rect x="18" y="41" width="28" height="6" fill="#355FA7" opacity="0.4" rx="3"/>

    <rect x="60" y="36" width="40" height="16" fill="#355FA7" opacity="0.15" rx="8"/>
    <rect x="66" y="41" width="28" height="6" fill="#355FA7" opacity="0.4" rx="3"/>

    <rect x="108" y="36" width="40" height="16" fill="#355FA7" opacity="0.15" rx="8"/>
    <rect x="114" y="41" width="28" height="6" fill="#355FA7" opacity="0.4" rx="3"/>

    <rect x="156" y="36" width="40" height="16" fill="#e5e7eb" rx="8"/>
    <rect x="162" y="41" width="28" height="6" fill="#d1d5db" rx="3"/>

    <rect x="204" y="36" width="40" height="16" fill="#e5e7eb" rx="8"/>
    <rect x="210" y="41" width="28" height="6" fill="#d1d5db" rx="3"/>

    <!-- "every 6h" row: label bar + value bar -->
    <rect x="12" y="64" width="36" height="6" fill="#355FA7" opacity="0.6" rx="3"/>
    <rect x="56" y="64" width="80" height="6" fill="#9ca3af" rx="3"/>

    <!-- next run row -->
    <rect x="12" y="80" width="52" height="6" fill="#355FA7" opacity="0.4" rx="3"/>
    <rect x="72" y="80" width="100" height="6" fill="#9ca3af" rx="3"/>

    <!-- Alert card (bottom half) -->
    <rect x="0" y="120" width="336" height="108" fill="#ffffff" filter="url(#shadow-h4)" rx="8"/>

    <!-- Red left border accent -->
    <rect x="0" y="120" width="4" height="108" fill="#ef4444" rx="2"/>

    <text x="16" y="138" font-family="sans-serif" font-size="10" font-weight="800" fill="#dc2626" letter-spacing="0.5">ALERT</text>

    <!-- Divider -->
    <rect x="16" y="144" width="308" height="1" fill="#fee2e2"/>

    <!-- Alert message bars -->
    <rect x="16" y="156" width="240" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="16" y="170" width="180" height="6" fill="#e5e7eb" rx="3"/>

    <!-- Divider -->
    <rect x="16" y="184" width="308" height="1" fill="#f3f4f6"/>

    <!-- "View runs" button pill -->
    <rect x="16" y="196" width="72" height="22" fill="#355FA7" opacity="0.15" rx="6"/>
    <rect x="26" y="204" width="52" height="6" fill="#355FA7" opacity="0.6" rx="3"/>
  </g>
</svg>
