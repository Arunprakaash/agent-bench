<svg viewBox="0 0 400 280" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-h2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#355FA7" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="shadow-h2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f0f4fb" rx="16"/>
  <rect width="100%" height="100%" fill="url(#grid-h2)" rx="16"/>

  <g transform="translate(32, 24)">
    <!-- Scenario name pill -->
    <rect x="0" y="0" width="90" height="18" fill="#e5e7eb" rx="9"/>
    <rect x="10" y="6" width="56" height="6" fill="#9ca3af" rx="3"/>

    <!-- Turn 1 card -->
    <rect x="0" y="28" width="336" height="68" fill="#ffffff" filter="url(#shadow-h2)" rx="8"/>
    <text x="12" y="44" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">TURN 1</text>
    <!-- User message bar -->
    <rect x="12" y="52" width="200" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="64" width="140" height="6" fill="#d1d5db" rx="3"/>
    <!-- EXPECTS label + brand bar -->
    <text x="12" y="82" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">EXPECTS</text>
    <rect x="68" y="76" width="100" height="6" fill="#355FA7" opacity="0.4" rx="3"/>

    <!-- Turn 2 card -->
    <rect x="0" y="108" width="336" height="68" fill="#ffffff" filter="url(#shadow-h2)" rx="8"/>
    <text x="12" y="124" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">TURN 2</text>
    <!-- User message bar -->
    <rect x="12" y="132" width="180" height="6" fill="#e5e7eb" rx="3"/>
    <rect x="12" y="144" width="120" height="6" fill="#d1d5db" rx="3"/>
    <!-- EXPECTS label + brand bar -->
    <text x="12" y="162" font-family="sans-serif" font-size="10" font-weight="800" fill="#6b7280" letter-spacing="0.5">EXPECTS</text>
    <rect x="68" y="156" width="80" height="6" fill="#355FA7" opacity="0.4" rx="3"/>

    <!-- Add button placeholder -->
    <rect x="0" y="190" width="48" height="22" fill="#e5e7eb" rx="6"/>
    <rect x="18" y="199" width="12" height="4" fill="#9ca3af" rx="2"/>
  </g>
</svg>
